<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Barbering Income</title>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255,255,255,0.038);
  --glass-bg: rgba(255,255,255,0.038);
  --glass-border: rgba(255,255,255,0.07);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.45);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --radius-lg: 16px;
  --radius-md: 12px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body::before {
  content: ''; position: fixed; inset: -10%;
  z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 14%, rgba(110,231,183,0.10) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(180,180,200,0.05) 0%, transparent 55%),
    linear-gradient(180deg, #0A0A0B 0%, #050506 100%);
  filter: blur(40px); pointer-events: none;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.013) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none;
}

.shell {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 20px calc(96px + env(safe-area-inset-bottom));
}
@media (max-width: 600px) {
  .shell { padding: 24px 16px calc(96px + env(safe-area-inset-bottom)); }
}

.page-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.20em; text-transform: uppercase;
  color: var(--text-tertiary); font-family: var(--font-mono);
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.page-title::before {
  content: ''; width: 18px; height: 1px;
  background: var(--text-tertiary); opacity: 0.5;
}
.page-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 10px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: var(--glass-shadow);
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute;
  top: 0; left: 14px; right: 14px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
  pointer-events: none;
}

.section-title {
  margin-bottom: 12px;
}
.section-title-text {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-tertiary);
  font-family: var(--font-mono);
}

/* Bottom tab bar */
.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
  display: flex; justify-content: center;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, rgba(10,10,11,0) 0%, rgba(10,10,11,0.78) 38%, rgba(10,10,11,0.94) 100%);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  pointer-events: none;
}
.tabbar-inner {
  pointer-events: auto; display: flex;
  width: 100%; max-width: 460px;
  gap: 6px; padding: 6px;
  background: rgba(20,20,22,0.72);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  box-shadow: 0 12px 36px rgba(0,0,0,0.55);
}
.tab {
  flex: 1 1 0; display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 12px 14px; border-radius: 13px;
  font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
  color: rgba(255,255,255,0.6); text-decoration: none;
  background: transparent; border: 1px solid transparent;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: #fff; }
.tab[aria-current="page"] {
  color: #fff; background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.10);
}
.tab-icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }
.tab-icon svg { width: 100%; height: 100%; display: block; }
@media (max-width: 480px) {
  .tabbar { padding-left: 10px; padding-right: 10px; }
  .tabbar-inner { gap: 4px; padding: 4px; }
  .tab { padding: 10px 6px; font-size: 12px; gap: 5px; letter-spacing: 0; }
  .tab-icon { width: 16px; height: 16px; }
}

/* ============================================================
   BARBERING INCOME
   ============================================================ */
.barber-hero { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
@media(max-width:480px){ .barber-hero { grid-template-columns:1fr 1fr; } }
.barber-stat-eyebrow {
  font-size:10px; color:var(--text-tertiary); text-transform:uppercase;
  letter-spacing:0.12em; font-weight:700; font-family:var(--font-mono); margin-bottom:4px;
}
.barber-stat-num {
  font-size:26px; font-weight:700; color:var(--text-primary);
  line-height:1.1; font-variant-numeric:tabular-nums;
}
.barber-stat-sub { font-size:11px; color:var(--text-tertiary); margin-top:2px; }
.barber-stat-num.green { color:#6BE3A4; }

.barber-form { display:flex; flex-direction:column; gap:10px; }
.barber-form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media(max-width:480px){ .barber-form-row { grid-template-columns:1fr; } }
.barber-label {
  display:block; font-size:10px; color:var(--text-tertiary); text-transform:uppercase;
  letter-spacing:0.14em; font-weight:700; font-family:var(--font-mono); margin-bottom:6px;
}
.barber-date-input {
  width:100%; padding:12px 14px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  border-radius:10px; color:var(--text-primary); font-family:inherit;
  font-size:15px; font-weight:600; color-scheme:dark;
  box-sizing:border-box; cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
.barber-date-input:focus { outline:none; border-color:rgba(110,231,183,0.5); }
.barber-stepper {
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  border-radius:10px; overflow:hidden;
}
.barber-stepper-btn {
  width:48px; height:50px; flex-shrink:0;
  background:rgba(255,255,255,0.05); border:none;
  color:var(--text-primary); font-size:22px; font-weight:300;
  cursor:pointer; font-family:inherit; line-height:1;
  -webkit-tap-highlight-color: transparent;
  transition:background 0.12s;
  display:flex; align-items:center; justify-content:center;
}
.barber-stepper-btn:hover  { background:rgba(255,255,255,0.12); }
.barber-stepper-btn:active { background:rgba(110,231,183,0.18); color:#6EE7B7; }
.barber-stepper-val {
  flex:1; text-align:center; font-size:26px; font-weight:700;
  color:var(--text-primary); font-variant-numeric:tabular-nums;
  pointer-events:none; user-select:none;
}
.barber-price-wrap {
  display:flex; align-items:center;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  border-radius:10px; overflow:hidden;
}
.barber-price-symbol {
  padding:0 0 0 14px; font-size:18px; font-weight:700;
  color:var(--text-tertiary); pointer-events:none; flex-shrink:0;
}
.barber-price-input {
  flex:1; width:0; min-width:0; padding:12px 14px;
  background:transparent; border:none; outline:none;
  color:var(--text-primary); font-family:inherit;
  font-size:22px; font-weight:700; font-variant-numeric:tabular-nums;
  -moz-appearance:textfield;
}
.barber-price-input::-webkit-outer-spin-button,
.barber-price-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.barber-price-wrap:focus-within { border-color:rgba(110,231,183,0.5); }
.barber-add-btn {
  width:100%; padding:15px;
  background:linear-gradient(180deg,#6EE7B7,#4ED4A0); color:#04201A;
  border:none; border-radius:12px; font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; letter-spacing:0.02em;
  box-shadow:0 4px 18px rgba(110,231,183,0.28);
  transition:transform 0.12s, box-shadow 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.barber-add-btn:hover  { transform:translateY(-1px); box-shadow:0 6px 22px rgba(110,231,183,0.40); }
.barber-add-btn:active { transform:scale(0.98); box-shadow:none; }
.barber-preview {
  display:none; margin-top:8px; padding:8px 12px;
  background:rgba(110,231,183,0.06); border:1px solid rgba(110,231,183,0.14);
  border-radius:8px; font-size:12px; color:var(--text-secondary);
  font-family:var(--font-mono);
}
.barber-week-head {
  display:flex; justify-content:space-between; align-items:baseline;
  margin:16px 4px 6px;
}
.barber-week-label {
  font-size:10px; letter-spacing:0.18em; font-weight:800;
  text-transform:uppercase; color:var(--text-tertiary); font-family:var(--font-mono);
}
.barber-week-total {
  font-size:12px; font-weight:700; color:#6BE3A4;
  font-family:var(--font-mono); font-variant-numeric:tabular-nums;
}
.barber-session-row {
  display:grid; grid-template-columns:1fr auto auto auto;
  gap:10px; align-items:center;
  padding:10px 14px; background:rgba(255,255,255,0.025);
  border-radius:10px; margin-bottom:5px; font-size:13px;
  transition:background 0.15s;
}
.barber-session-row:hover { background:rgba(255,255,255,0.045); }
.barber-session-date { color:var(--text-primary); font-weight:500; }
.barber-session-meta {
  color:var(--text-secondary); font-family:var(--font-mono);
  font-size:11px; white-space:nowrap;
}
.barber-session-total {
  color:#6BE3A4; font-weight:700; font-family:var(--font-mono);
  font-variant-numeric:tabular-nums; white-space:nowrap;
}
.barber-session-del {
  background:transparent; border:1px solid rgba(255,255,255,0.08);
  color:var(--text-tertiary); cursor:pointer; font-size:13px;
  padding:3px 8px; border-radius:6px; font-family:inherit; line-height:1;
}
.barber-session-del:hover { color:#FF8A8A; border-color:rgba(255,138,138,0.35); }
.barber-empty {
  text-align:center; padding:24px 0;
  font-size:12px; color:var(--text-tertiary); font-style:italic;
}
.chart-wrap {
  position:relative; width:100%; height:160px; margin-top:4px;
}
.chart-wrap svg { width:100%; height:100%; display:block; }
.chart-empty {
  position:absolute; inset:0; display:none;
  align-items:center; justify-content:center;
  font-size:12px; color:var(--text-tertiary); font-style:italic;
}
</style>
</head>
<body>

  <!-- Hero stats -->
  <div class="card" style="background:linear-gradient(135deg,rgba(107,227,164,0.08),rgba(110,231,183,0.04));border:1px solid rgba(107,227,164,0.18)">

<script>
(function() {
  function storeGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
  function storeSet(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  const BARBER_KEY = 'barber:sessions';
  function getBarberSessions() { return storeGet(BARBER_KEY) || []; }
  function saveBarberSessions(arr) { storeSet(BARBER_KEY, arr); }

  function isoWeekKey(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dow = tmp.getUTCDay() || 7;
    tmp.setUTCDate(tmp.getUTCDate() + 4 - dow);
    const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
    const wk = Math.ceil(((tmp - yearStart) / 86400000 + 1) / 7);
    return tmp.getUTCFullYear() + '-W' + String(wk).padStart(2, '0');
  }

  function getThisWeekKey() {
    return isoWeekKey(new Date().toISOString().slice(0, 10));
  }

  function nextWeekKey(wkKey) {
    const [yr, w] = wkKey.split('-W').map(Number);
    const jan4 = new Date(Date.UTC(yr, 0, 4));
    const dow = jan4.getUTCDay() || 7;
    const monday = new Date(jan4);
    monday.setUTCDate(jan4.getUTCDate() - dow + 1 + (w - 1) * 7 + 7);
    return isoWeekKey(monday.toISOString().slice(0, 10));
  }

  function getWeekRange(fromKey, toKey) {
    const weeks = [];
    let cur = fromKey;
    for (let i = 0; i < 200 && cur <= toKey; i++) {
      weeks.push(cur);
      cur = nextWeekKey(cur);
    }
    return weeks;
  }

  function formatWeekLabel(wkKey) {
    const [yr, w] = wkKey.split('-W').map(Number);
    const jan4 = new Date(Date.UTC(yr, 0, 4));
    const dow = jan4.getUTCDay() || 7;
    const monday = new Date(jan4);
    monday.setUTCDate(jan4.getUTCDate() - dow + 1 + (w - 1) * 7);
    const sunday = new Date(monday);
    sunday.setUTCDate(monday.getUTCDate() + 6);
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return fmt(monday) + ' – ' + fmt(sunday);
  }

  function fmtBarberAmt(n) {
    return '$' + Math.round(n).toLocaleString('en-US');
  }

  function renderBarberChart() {
    const sessions = getBarberSessions();
    const svg = document.getElementById('barberChartSvg');
    const empty = document.getElementById('barberChartEmpty');
    svg.innerHTML = '';
    if (!sessions.length) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';

    const weekTotals = {};
    sessions.forEach(s => {
      const wk = isoWeekKey(s.date);
      weekTotals[wk] = (weekTotals[wk] || 0) + s.cuts * s.pricePerCut;
    });
    const sortedWks = Object.keys(weekTotals).sort();
    const allWeeks = getWeekRange(sortedWks[0], getThisWeekKey());
    const display = allWeeks.slice(-16);
    const values = display.map(w => weekTotals[w] || 0);

    const W = 600, H = 160;
    const padT = 18, padB = 28, padL = 4, padR = 4;
    const n = display.length;
    const maxVal = Math.max(...values, 1);
    const totalW = W - padL - padR;
    const barW = totalW / n;
    const gap = Math.max(2, barW * 0.18);
    const bw = barW - gap;
    const cH = H - padT - padB;
    const ns = 'http://www.w3.org/2000/svg';
    const thisWk = getThisWeekKey();

    [0.33, 0.67, 1].forEach(r => {
      const y = padT + cH * (1 - r);
      const el = document.createElementNS(ns, 'line');
      el.setAttribute('x1', padL); el.setAttribute('x2', W - padR);
      el.setAttribute('y1', y);    el.setAttribute('y2', y);
      el.setAttribute('stroke', 'rgba(255,255,255,0.05)');
      el.setAttribute('stroke-width', '1');
      svg.appendChild(el);
    });

    values.forEach((v, i) => {
      const x = padL + i * barW + gap / 2;
      const bh = v > 0 ? Math.max(3, (v / maxVal) * cH) : 0;
      const y = padT + cH - bh;
      const isNow = display[i] === thisWk;

      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', Math.max(1, bw));
      rect.setAttribute('height', bh); rect.setAttribute('rx', '3');
      rect.setAttribute('fill', isNow ? '#6EE7B7' : 'rgba(110,231,183,0.38)');
      if (isNow) rect.setAttribute('filter', 'drop-shadow(0 0 5px rgba(110,231,183,0.55))');
      svg.appendChild(rect);

      if (v > 0 && n <= 12) {
        const lbl = document.createElementNS(ns, 'text');
        lbl.setAttribute('x', x + bw / 2); lbl.setAttribute('y', y - 3);
        lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('font-size', '9');
        lbl.setAttribute('fill', isNow ? '#6EE7B7' : 'rgba(110,231,183,0.65)');
        lbl.setAttribute('font-family', 'ui-monospace,monospace');
        lbl.textContent = '$' + Math.round(v);
        svg.appendChild(lbl);
      }

      if (n <= 10 || i % 2 === 0 || i === n - 1) {
        const wlbl = document.createElementNS(ns, 'text');
        wlbl.setAttribute('x', x + bw / 2); wlbl.setAttribute('y', H - 5);
        wlbl.setAttribute('text-anchor', 'middle'); wlbl.setAttribute('font-size', '8');
        wlbl.setAttribute('fill', isNow ? '#6EE7B7' : 'rgba(118,116,110,0.75)');
        wlbl.setAttribute('font-family', 'ui-monospace,monospace');
        wlbl.textContent = display[i].split('-')[1];
        svg.appendChild(wlbl);
      }
    });
  }

  function renderBarber() {
    const sessions = getBarberSessions();
    const logEl = document.getElementById('barberLog');

    const totalEarned = sessions.reduce((s, x) => s + x.cuts * x.pricePerCut, 0);
    const totalSessions = sessions.length;
    const totalCuts = sessions.reduce((s, x) => s + x.cuts, 0);

    const thisWk = getThisWeekKey();
    const thisWkSess = sessions.filter(x => isoWeekKey(x.date) === thisWk);
    const thisWkEarned = thisWkSess.reduce((s, x) => s + x.cuts * x.pricePerCut, 0);
    const thisWkCuts = thisWkSess.reduce((s, x) => s + x.cuts, 0);

    const weekTotals = {};
    sessions.forEach(x => {
      const w = isoWeekKey(x.date);
      weekTotals[w] = (weekTotals[w] || 0) + x.cuts * x.pricePerCut;
    });
    const wks = Object.keys(weekTotals);
    const avgEarned = wks.length ? totalEarned / wks.length : 0;
    const avgCuts = wks.length ? totalCuts / wks.length : 0;

    document.getElementById('barberTotalEarned').textContent = fmtBarberAmt(totalEarned);
    document.getElementById('barberTotalSessions').textContent = totalSessions + ' session' + (totalSessions === 1 ? '' : 's');
    document.getElementById('barberThisWeek').textContent = fmtBarberAmt(thisWkEarned);
    document.getElementById('barberThisWeekCuts').textContent = thisWkCuts + ' cut' + (thisWkCuts === 1 ? '' : 's');
    document.getElementById('barberWeekAvg').textContent = fmtBarberAmt(avgEarned);
    document.getElementById('barberAvgCuts').textContent = (wks.length ? avgCuts.toFixed(1) : '0') + ' cuts avg';

    renderBarberChart();

    logEl.innerHTML = '';
    if (!sessions.length) {
      logEl.innerHTML = '<div class="barber-empty">No sessions logged yet</div>';
      return;
    }

    const sorted = [...sessions].sort((a, b) => b.date.localeCompare(a.date));
    const byWeek = {};
    sorted.forEach(s => {
      const w = isoWeekKey(s.date);
      (byWeek[w] = byWeek[w] || []).push(s);
    });

    Object.entries(byWeek).sort((a, b) => b[0].localeCompare(a[0])).forEach(([wk, wkSess]) => {
      const wkTotal = wkSess.reduce((t, s) => t + s.cuts * s.pricePerCut, 0);
      const wkCuts = wkSess.reduce((t, s) => t + s.cuts, 0);
      const isNow = wk === thisWk;

      const head = document.createElement('div');
      head.className = 'barber-week-head';
      head.innerHTML = '<span class="barber-week-label">'
        + (isNow ? 'THIS WEEK' : formatWeekLabel(wk))
        + '</span><span class="barber-week-total">'
        + fmtBarberAmt(wkTotal) + ' · ' + wkCuts + ' cut' + (wkCuts === 1 ? '' : 's')
        + '</span>';
      logEl.appendChild(head);

      wkSess.sort((a, b) => b.date.localeCompare(a.date)).forEach(s => {
        const row = document.createElement('div');
        row.className = 'barber-session-row';
        const d = new Date(s.date + 'T12:00:00');
        const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        row.innerHTML = '<span class="barber-session-date">' + dateLabel + '</span>'
          + '<span class="barber-session-meta">' + s.cuts + ' × $' + s.pricePerCut.toFixed(2) + '</span>'
          + '<span class="barber-session-total">' + fmtBarberAmt(s.cuts * s.pricePerCut) + '</span>'
          + '<button class="barber-session-del" data-id="' + s.id + '">×</button>';
        row.querySelector('button').addEventListener('click', () => {
          saveBarberSessions(getBarberSessions().filter(x => x.id !== s.id));
          renderBarber();
        });
        logEl.appendChild(row);
      });
    });
  }

  const barberDateEl    = document.getElementById('barberDate');
  const barberPriceEl   = document.getElementById('barberPrice');
  const barberPreviewEl = document.getElementById('barberPreview');
  const barberCutsDisplayEl = document.getElementById('barberCutsDisplay');

  let barberCutsCount = 0;

  function setBarberCuts(n) {
    barberCutsCount = Math.max(0, Math.min(99, n));
    barberCutsDisplayEl.textContent = barberCutsCount;
    updateBarberPreview();
  }

  document.getElementById('barberCutsUp').addEventListener('click', () => setBarberCuts(barberCutsCount + 1));
  document.getElementById('barberCutsDown').addEventListener('click', () => setBarberCuts(barberCutsCount - 1));

  barberDateEl.value = new Date().toISOString().slice(0, 10);

  function updateBarberPreview() {
    const cuts = barberCutsCount;
    const price = parseFloat(barberPriceEl.value) || 0;
    if (cuts > 0 && price > 0) {
      barberPreviewEl.style.display = 'block';
      barberPreviewEl.textContent = cuts + ' cut' + (cuts === 1 ? '' : 's')
        + ' × $' + price.toFixed(2) + ' = ' + fmtBarberAmt(cuts * price);
    } else {
      barberPreviewEl.style.display = 'none';
    }
  }
  barberPriceEl.addEventListener('input', updateBarberPreview);

  document.getElementById('barberAddBtn').addEventListener('click', () => {
    const date = barberDateEl.value;
    const cuts = barberCutsCount;
    const price = parseFloat(barberPriceEl.value) || 0;
    if (!date || cuts < 1 || price <= 0) {
      if (cuts < 1) barberCutsDisplayEl.closest('.barber-stepper').style.borderColor = '#FF8A8A';
      if (price <= 0) barberPriceEl.closest('.barber-price-wrap').style.borderColor = '#FF8A8A';
      setTimeout(() => {
        barberCutsDisplayEl.closest('.barber-stepper').style.borderColor = '';
        barberPriceEl.closest('.barber-price-wrap').style.borderColor = '';
      }, 1200);
      return;
    }
    const arr = getBarberSessions();
    arr.push({ id: 'b_' + Date.now(), date, cuts, pricePerCut: price });
    saveBarberSessions(arr);
    setBarberCuts(0);
    barberPriceEl.value = '';
    barberPreviewEl.style.display = 'none';
    renderBarber();
  });

  barberPriceEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('barberAddBtn').click();
  });

  renderBarber();
})();
</script>
</body>
</html>
